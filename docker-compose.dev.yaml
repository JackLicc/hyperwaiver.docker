services:
  webapp:
    build:
      context: ./codebases/hyperwaiver-fe
      dockerfile: ../../docker/images/webapp/development/Dockerfile # relative to the context
    env_file: "./docker/images/webapp/development/env.development"
    container_name: webapp
    environment:
      - NODE_ENV=development
    tty: true
    volumes:
      - ./codebases:/var/www/
      - /var/www/hyperwaiver-fe/node_modules
    ports:
      - "3000:3000"
    expose:
      - "3000"
    networks:
      web-network:

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    volumes:
      - mailpit_data:/data
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      web-network:

volumes:
  mailpit_data:
    driver: local