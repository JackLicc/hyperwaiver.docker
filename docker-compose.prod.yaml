services:
  caddy:
    depends_on:
      - beanstalkd
      - mariadb
      - php-fpm
      - redis
      - webapp
    
  webapp:
    build:
      context: ./codebases/hyperwaiver-fe
    container_name: webapp
    tty: true
    volumes:
      - ./codebases:/var/www/
    working_dir: /var/www/hyperwaiver-fe
    ports:
      - "3000:3000"
    expose:
      - "3000"
    networks:
      web-network: